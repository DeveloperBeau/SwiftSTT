name: Feature request
description: Propose a new capability or API change.
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the use case before the proposed API. The maintainer prefers
        small, focused proposals over framework-level redesigns.

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to do? What does the world look like
        once this lands?
    validations:
      required: true

  - type: textarea
    id: current-workaround
    attributes:
      label: Current workaround
      description: How are you solving this today, if at all?
    validations:
      required: false

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behaviour
      description: Sketch the API or describe the behaviour change. Pseudo-code
        is fine.
      render: swift
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I am willing to open a pull request for this.
        - label: This is a breaking change.
