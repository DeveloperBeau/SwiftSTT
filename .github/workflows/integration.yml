name: Integration

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Whisper model to download for the run"
        required: false
        default: "tiny"
        type: choice
        options:
          - tiny
          - base
          - small
          - largeV3Turbo

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integration:
    name: Real .mlmodelc transcription
    runs-on: macos-15
    timeout-minutes: 30
    env:
      SWIFTWHISPER_RUN_INTEGRATION: "1"
      SWIFTWHISPER_INTEGRATION_MODEL: ${{ inputs.model || 'tiny' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Swift 6.3
        uses: DeveloperBeau/resolve-swift@v2
        with:
          swift-version: '6.3'

      - name: Swift version
        run: swift --version

      - name: Run integration tests
        run: swift test --filter SwiftWhisperIntegrationTests
