name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_16.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          elif [ -d "/Applications/Xcode_16.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app
          elif [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app
          else
            echo "No suitable Xcode 16.x found"
            ls /Applications/ | grep -i xcode
            exit 1
          fi
          xcodebuild -version

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build -c debug

      - name: Build (release)
        run: swift build -c release

      - name: Test with coverage
        run: swift test --enable-code-coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: |
            .build/debug/codecov/
            .build/*/debug/codecov/
          if-no-files-found: ignore
